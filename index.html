    <!-- AUTH LOGIC V4 -->
    <script>
        const AUTH_API = "https://script.google.com/macros/s/AKfycbzUNA96SRsLQv7hlu83GAx6L85kEia8S52KY7nCRfWLlpJslMAT_Z-n9PMOoG_RNW6Q/exec";
        let deviceId = localStorage.getItem('TDC_DEVICE_ID');
        if (!deviceId) {
            deviceId = "TDC-" + Math.random().toString(36).substring(2, 6).toUpperCase() + "-" + Math.random().toString(36).substring(2, 6).toUpperCase();
            localStorage.setItem('TDC_DEVICE_ID', deviceId);
        }

        function checkAuth() {
            if (localStorage.getItem('TDC_APPROVED') === 'true') {
                setInterval(silentVerify, 10000); 
                return;
            }
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('lock-screen').style.display = 'flex';
                document.body.style.overflow = 'hidden';
                verifyWithServer();
            });
        }

        function verifyWithServer() {
            const statusText = document.getElementById('lock-status');
            const lockContainer = document.getElementById('lock-container');
            const lockScreen = document.getElementById('lock-screen');
            if(!statusText) return;
            statusText.innerText = "Đang mã hóa tín hiệu Server...";
            lockContainer.classList.add('hidden');

            fetch(AUTH_API + "?id=" + deviceId)
                .then(r => r.json())
                .then(data => {
                    if (data.status === "approved" || data.status === "ok") {
                        localStorage.setItem('TDC_APPROVED', 'true');
                        lockScreen.style.opacity = '0';
                        setTimeout(() => { lockScreen.style.display = 'none'; document.body.style.overflow = 'auto'; }, 500);
                    } else {
                        statusText.innerHTML = "Chào mừng Sinh Viên Y Khoa.<br>Vui lòng sao chép mã thiết bị để kích hoạt.";
                        document.getElementById('lock-device-code').value = deviceId;
                        lockContainer.classList.remove('hidden');
                    }
                })
                .catch(e => {
                    statusText.innerHTML = "Offline.<br>Yêu cầu mạng di động/WiFi để xác thực khóa.";
                    lockContainer.classList.remove('hidden');
                });
        }

        function silentVerify() {
            if(navigator.onLine && localStorage.getItem('TDC_APPROVED') === 'true') {
                fetch(AUTH_API + "?id=" + deviceId).then(r => r.json()).then(data => {
                    if(data.status === "locked" || data.status === "error") {
                        localStorage.setItem('TDC_APPROVED', 'false'); window.location.reload();
                    }
                }).catch(e => {});
            }
        }

        function copyDeviceId() {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(deviceId);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = deviceId;
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }
            } catch(err) {
                console.error('Copy failed', err);
            }
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = '<i class="fas fa-check text-green-400 text-xl"></i> <span class="tracking-wide text-green-400">ĐÃ LƯU VÀO BỘ NHỚ</span>';
            setTimeout(() => { btn.innerHTML = '<div class="absolute inset-0 w-1/4 bg-white/10 -skew-x-12 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div><i class="fas fa-paste text-xl text-blue-400"></i> <span class="tracking-wide">SAO CHÉP MÃ THIẾT BỊ</span>'; }, 3000);
        }

        checkAuth();
    </script>

{"url": "3D_VI\u00caM T\u1ee4Y C\u1ea4P.html", "title": "VI\u00caM T\u1ee4Y C\u1ea4P", "category": "Ti\u00eau H\u00f3a"},
{"url": "3D_XU\u1ea4T HUY\u1ebeT TI\u00caU H\u00d3A TR\u00caN.html", "title": "XU\u1ea4T HUY\u1ebeT TI\u00caU H\u00d3A TR\u00caN", "category": "Ti\u00eau H\u00f3a"},
{"url": "3D_STEMIN TR\u00caN N\u1ec0N CKD.html", "title": "STEMIN TR\u00caN N\u1ec0N CKD", "category": "Tim M\u1ea1ch"},
{"url": "3D_HEN PH\u1ebe QU\u1ea2N.html", "title": "HEN PH\u1ebe QU\u1ea2N", "category": "H\u00f4 H\u1ea5p"},
{"url": "3D_L\u1eccC M\u00c0NG B\u1ee4NG.html", "title": "L\u1eccC M\u00c0NG B\u1ee4NG", "category": "Th\u1eadn - Ti\u1ebft Ni\u1ec7u"}];
        const CATEGORIES = ["T\u1ea5t c\u1ea3", "C\u01a1 X\u01b0\u01a1ng Kh\u1edbp", "Huy\u1ebft H\u1ecdc", "H\u00f4 H\u1ea5p", "H\u1ed3i S\u1ee9c C\u1ea5p C\u1ee9u", "L\u00e3o Khoa", "N\u1ed9i Ti\u1ebft", "Th\u1ea7n Kinh & Kh\u00e1c", "Th\u1eadn - Ti\u1ebft Ni\u1ec7u", "Tim M\u1ea1ch", "Ti\u00eau H\u00f3a"];
        
        const catIcons = {
            "Tim Mạch": "fa-heartbeat text-rose-500",
            "Hô Hấp": "fa-lungs text-sky-500",
            "Tiêu Hóa": "fa-stomach text-amber-500",
            "Nội Tiết": "fa-dna text-purple-500",
            "Thận - Tiết Niệu": "fa-kidneys text-indigo-500",
            "Lão Khoa": "fa-leaf text-teal-400",
            "Cơ Xương Khớp": "fa-bone text-stone-500",
            "Huyết Học": "fa-tint text-red-600",
            "Thần Kinh & Khác": "fa-brain text-pink-500",
            "Hồi Sức Cấp Cứu": "fa-truck-medical text-orange-500",
            "Tất cả": "fa-layer-group text-slate-500"
        };
        
        let currentFilter = "Tất cả";
        let showOnlyBookmarks = false;
        
        const caseListEl = document.getElementById('caseList');
        const categoryTabsEl = document.getElementById('categoryTabs');
        const searchInput = document.getElementById('searchInput');
        const bookmarkBtn = document.getElementById('showBookmarks');
        
        function getBookmarks() { return JSON.parse(localStorage.getItem('pwa_bookmarks') || '[]'); }
        function getCompleted() { return JSON.parse(localStorage.getItem('pwa_completed') || '[]'); }
        
        function updateStats() {
            const b = getBookmarks();
            const c = getCompleted();
            const bCnt = document.getElementById('bookmarkCount');
            bCnt.innerText = b.length;
            if(b.length > 0) bCnt.classList.remove('hidden'); else bCnt.classList.add('hidden');
            
            document.getElementById('completedStat').innerText = c.length;
            document.getElementById('progressBar').style.width = (c.length / ALL_CASES.length * 100) + '%';
        }

        function renderCategories() {
            categoryTabsEl.innerHTML = CATEGORIES.map(cat => {
                const isActive = currentFilter === cat && !showOnlyBookmarks;
                const baseClass = "px-5 py-2.5 rounded-full text-[11px] font-bold tracking-widest uppercase transition-all duration-300 border flex items-center gap-2 shrink-0 shadow-lg ";
                const activeClass = "bg-white/20 text-white border-white/40 backdrop-blur-md";
                const inactiveClass = "bg-slate-800/40 text-slate-300 border-slate-700/50 backdrop-blur-md hover:bg-slate-700/60";
                
                let iconClass = catIcons[cat] || "fa-book-medical";
                if(isActive) iconClass = iconClass.replace(/text-\w+-\d+/, 'text-white');
                
                return `<button onclick="setCategory('${cat}')" class="${baseClass} ${isActive ? activeClass : inactiveClass}"><i class="fas ${iconClass} text-sm"></i> ${cat}</button>`;
            }).join('');
        }
        
        window.setCategory = function(cat) {
            currentFilter = cat; showOnlyBookmarks = false;
            bookmarkBtn.classList.remove('text-red-500', 'bg-red-50', 'dark:bg-red-900/40');
            bookmarkBtn.classList.add('text-slate-400');
            
            // Refreeze animations
            const cards = document.querySelectorAll('.card-anim');
            cards.forEach(c => c.style.animation = 'none');
            
            document.getElementById('listTitle').innerText = (cat === "Tất cả") ? "Tất cả bài học" : cat;
            renderCategories(); renderCases();
        };
        
        bookmarkBtn.addEventListener('click', () => {
            showOnlyBookmarks = !showOnlyBookmarks;
            if (showOnlyBookmarks) {
                bookmarkBtn.classList.add('text-red-500', 'bg-red-50', 'dark:bg-red-900/40');
                bookmarkBtn.classList.remove('text-slate-400');
                document.getElementById('listTitle').innerText = "Tủ sách lưu trữ (Heart)";
            } else {
                bookmarkBtn.classList.remove('text-red-500', 'bg-red-50', 'dark:bg-red-900/40');
                bookmarkBtn.classList.add('text-slate-400');
                document.getElementById('listTitle').innerText = (currentFilter === "Tất cả") ? "Tất cả bài học" : currentFilter;
            }
            renderCategories(); renderCases();
        });

        function renderCases() {
            const term = searchInput.value.toLowerCase();
            const bookmarks = getBookmarks();
            const completed = getCompleted();
            let visibleCount = 0; let html = "";
            
            ALL_CASES.forEach((caseItem, index) => {
                if (showOnlyBookmarks && !bookmarks.includes(caseItem.url)) return;
                if (!showOnlyBookmarks && currentFilter !== "Tất cả" && caseItem.category !== currentFilter) return;
                if (term && !caseItem.title.toLowerCase().includes(term)) return;
                
                visibleCount++;
                const isCompleted = completed.includes(caseItem.url);
                const isBookmarked = bookmarks.includes(caseItem.url);
                const animDelay = (visibleCount * 0.05) + 's';
                
                html += `
                <a href="${caseItem.url}" class="card-anim block group relative bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl rounded-[24px] p-5 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.2)] hover:shadow-2xl transition-all duration-300 border border-slate-200/50 dark:border-slate-800 overflow-hidden" style="animation-delay: ${animDelay}">
                    ${isCompleted ? '<div class="absolute top-0 right-0 w-16 h-16 bg-gradient-to-bl from-emerald-500/20 to-transparent flex items-start justify-end rounded-tr-[24px]"><i class="fas fa-check text-emerald-500 p-3 pr-4 text-lg"></i></div>' : ''}
                    <div class="relative flex items-center justify-between z-10">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 flex-shrink-0 rounded-[18px] ${isCompleted ? 'bg-gradient-to-br from-emerald-100 to-teal-50 dark:from-emerald-900/60 dark:to-teal-900/40 border border-emerald-200 dark:border-emerald-800' : 'bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-blue-900/40 dark:to-indigo-900/20 border border-blue-100 dark:border-blue-800/50'} flex items-center justify-center group-hover:scale-105 group-hover:rotate-3 transition-all duration-500 shadow-inner">
                                <i class="fas ${isCompleted ? 'fa-shield-check text-emerald-500 text-2xl' : 'fa-laptop-medical text-blue-500 text-xl'}"></i>
                            </div>
                            <div class="pr-6">
                                <span class="text-[9px] font-black px-2.5 py-1 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 uppercase tracking-widest">${caseItem.category}</span>
                                <h3 class="font-heading font-bold text-slate-800 dark:text-white line-clamp-2 mt-1.5 leading-snug group-hover:text-blue-500 dark:group-hover:text-blue-400 transition-colors">${caseItem.title}</h3>
                                ${isBookmarked ? `<div class="mt-2 text-rose-500 text-xs flex items-center gap-1"><i class="fas fa-heart"></i> <span class="font-bold">Đã gắn Dấu Trang</span></div>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="absolute inset-0 border-2 border-transparent group-hover:border-blue-500/20 dark:group-hover:border-blue-500/10 rounded-[24px] pointer-events-none transition-colors duration-500"></div>
                </a>
                `;
            });
            
            caseListEl.innerHTML = html;
            document.getElementById('noResults').classList.toggle('hidden', visibleCount > 0);
        }

        searchInput.addEventListener('input', renderCases);
        
        const themeToggle = document.getElementById('themeToggle');
        const htmlContext = document.documentElement;
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { htmlContext.classList.add('dark'); }
        themeToggle.addEventListener('click', () => { htmlContext.classList.toggle('dark'); localStorage.setItem('theme', htmlContext.classList.contains('dark') ? 'dark' : 'light'); });

        renderCategories(); renderCases(); updateStats();
        
        window.addEventListener('focus', () => { updateStats(); renderCases(); silentVerify(); });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').then(r => console.log('SW V8 ready')).catch(e => console.error(e)));
        }
    
        // NETWORK STATUS LISTENER
        function updateNetworkStatus() {
            const statusText = document.getElementById('networkText');
            const statusDot = document.getElementById('networkDot');
            const statusContainer = document.getElementById('networkStatus');
            
            if (!statusText) return;
            
            if (navigator.onLine) {
                statusText.innerText = 'ONLINE';
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse transition-colors';
                statusContainer.className = 'text-[9px] uppercase font-bold tracking-widest text-emerald-500 flex items-center gap-1.5 transition-colors';
            } else {
                statusText.innerText = 'OFFLINE';
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-red-500 transition-colors';
                statusContainer.className = 'text-[9px] uppercase font-bold tracking-widest text-red-500 flex items-center gap-1.5 transition-colors';
            }
        }
        
        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        
        // Call it once on load
        document.addEventListener('DOMContentLoaded', updateNetworkStatus);

    </script>
</body>
</html>
